services:
  - type: web
    name: todo-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    branch: main
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: todo-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-backend-url.onrender.com